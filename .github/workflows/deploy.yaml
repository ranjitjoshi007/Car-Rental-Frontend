name: React CI/CD (Azure Runner)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Deploy to Nginx folder
      run: |
        rm -rf /var/www/html/react-app/*
        cp -r build/* /var/www/html/react-app/